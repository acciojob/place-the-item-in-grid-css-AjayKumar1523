<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid 2x2</title>

  <style>
    /* Grid container */
    .holder {
      display: grid;
      width: 200px;
      height: 200px;

      /* 2 rows & 2 columns using repeat */
      grid-template-rows: repeat(2, 1fr);
      grid-template-columns: repeat(2, 1fr);

      border: 1px solid #000;
    }

    /* Items (NOT modifying properties as per instruction) */
    .item {
      border: 1px solid #000;
    }
  </style>
</head>
<body>

  <div class="holder">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
  </div>

</body>
</html>
